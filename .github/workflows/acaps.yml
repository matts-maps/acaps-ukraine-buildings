name: ACAPS Ukraine Buildings

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  fetch-acaps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug file structure
        run: ls -R .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run ACAPS fetch script
        env:
          ACAPS_USERNAME: ${{ secrets.ACAPS_USERNAME }}
          ACAPS_PASSWORD: ${{ secrets.ACAPS_PASSWORD }}
        run: python scripts/fetch_acaps_ukraine.py

      - name: Commit updated CSVs
        run: |
          if git diff --quiet data/; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.csv
          git commit -m "Update ACAPS data"
          git push
