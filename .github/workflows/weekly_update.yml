name: Update Ukraine Damages

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run updater
        env:
          ACAPS_API_TOKEN: ${{ secrets.ACAPS_API_TOKEN }}
        run: python scripts/update.py

      - name: Run summariser
        run: python scripts/summarise.py

      - name: Run week-4 comparison analysis
        run: python scripts/compare_weeks.py

      - name: Sync with remote before committing
        run: git pull --rebase --autostash origin main

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly ACAPS updates, analytical summaries, and interactive dashboard update"
          file_pattern: >-
            data/ukraine-damages.csv
            data/ukraine-damages-weekly-summary.csv
            data/week_4_comparison.csv
            index.html