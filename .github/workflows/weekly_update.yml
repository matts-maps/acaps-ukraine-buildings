name: Weekly ACAPS Data Update

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: 

jobs:
  update-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Run update script
      env:
        ACAPS_TOKEN: ${{ secrets.ACAPS_API_TOKEN }}
      run: python update_data.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        if [ -f ukraine_damages.csv ]; then
          git add ukraine_damages.csv
          git diff-index --quiet HEAD || (git commit -m "Automated weekly ACAPS data update" && git push)
        else
          echo "ukraine_damages.csv was not found. Skipping git commit."
          exit 1
        fi