name: Update Ukraine Damages

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run updater
        env:
          ACAPS_API_TOKEN: ${{ secrets.ACAPS_API_TOKEN }}
        run: python scripts/update.py

      - name: Run summariser
        run: python scripts/summarise.py

      - name: Run week-4 comparison analysis
        run: python scripts/compare_weeks.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage raw datasets, summaries, and generated analytical image
          git add data/ukraine-damages.csv \
                  data/ukraine-damages-weekly-summary.csv \
                  data/week_4_comparison.csv \
                  data/week_4_comparison.png

          if git diff --cached --quiet; then
            echo "No changes detected in raw data, summaries, or plots."
          else
            git commit -m "Weekly ACAPS updates, analytical summaries, and historical trend plots"
            git push
          fi