name: Weekly ACAPS Data Update

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: 

jobs:
  update-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Inline Create and Run Script
      env:
        ACAPS_TOKEN: ${{ secrets.ACAPS_API_TOKEN }}
      run: |
        cat << 'EOF' > run_update.py
        import os
        import pandas as pd
        import requests

        CSV_FILE = "ukraine_damages.csv"
        API_URL = "https://api.acaps.org/api/v1/ukraine/damages/"

        def fetch_and_update():
            print("Starting fetch step...")
            api_token = os.environ.get("ACAPS_TOKEN")
            
            if api_token:
                print(f"Token read successfully. Length: {len(api_token)} chars.")
            else:
                print("WARNING: Secret environment variable is missing completely.")
                raise ValueError("Secret missing.")

            # Try Token format first
            headers = {
                "User-Agent": "Mozilla/5.0",
                "Authorization": f"Token {api_token}" 
            }
            
            response = requests.get(API_URL, headers=headers)
            
            # Fallback to Bearer format if 401 encountered
            if response.status_code == 401:
                print("Token format unauthorized. Retrying with Bearer format...")
                headers["Authorization"] = f"Bearer {api_token}"
                response = requests.get(API_URL, headers=headers)
                
            response.raise_for_status() 
            api_data = response.json()
            
            if isinstance(api_data, dict) and "results" in api_data:
                new_records = api_data["results"]
            elif isinstance(api_data, list):
                new_records = api_data
            else:
                new_records = [api_data] if isinstance(api_data, dict) else []

            if not new_records:
                raise ValueError("Parsed data is empty.")

            df_new = pd.DataFrame(new_records)

            if os.path.exists(CSV_FILE) and os.path.getsize(CSV_FILE) > 0:
                df_existing = pd.read_csv(CSV_FILE)
                df_combined = pd.concat([df_existing, df_new]).drop_duplicates().reset_index(drop=True)
            else:
                df_combined = df_new

            df_combined.to_csv(CSV_FILE, index=False)
            print(f"Successfully saved {len(df_combined)} rows.")

        if __name__ == "__main__":
            fetch_and_update()
        EOF
        
        python run_update.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        if [ -f ukraine_damages.csv ]; then
          git add ukraine_damages.csv
          git diff-index --quiet HEAD || (git commit -m "Automated weekly ACAPS data update" && git push)
        else
          echo "File not found. Skipping commit."
          exit 1
        fi