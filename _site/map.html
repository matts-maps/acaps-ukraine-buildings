<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Damage Assessment Map | E-PACC Ukraine</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  
</head>
<body>

  <header class="site-header">
  <div class="header-container">
    <a href="/" class="site-title">E-PACC Ukraine</a>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/map.html">Map Visualisations</a>
    </nav>
  </div>
</header>

  <main class="site-content">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<link rel="stylesheet" href="/assets/css/map-visualisations.css">

<div class="map-dashboard-container">
  <aside id="map-controls">
    <div id="map-error-msg"></div>
    <div class="map-control-group">
      <label for="map-year-select">Target Assessment Year:</label>
      <select id="map-year-select" onchange="processMapVisualisations()"></select>
    </div>
    <div class="map-control-group">
      <label for="map-aggregation-select">Time Frame Filter Type:</label>
      <select id="map-aggregation-select" onchange="buildMapPeriodDropdowns()">
        <option value="7">Weekly Granularity</option>
        <option value="14">Fortnightly Granularity</option>
        <option value="30" selected>Monthly Granularity</option>
      </select>
    </div>
    <div class="map-control-group">
      <label for="map-period-start-select">Select Window Frame Range:</label>
      <div class="map-range-row">
        <select id="map-period-start-select" onchange="processMapVisualisations()"></select>
        <span class="map-range-sep">to</span>
        <select id="map-period-end-select" onchange="processMapVisualisations()"></select>
      </div>
    </div>
    <div class="map-summary-box">
      <div class="label">National Frame Total</div>
      <div class="value" id="map-total-value">0</div>
    </div>
  </aside>
  <main id="map-wrapper-card">
    <h2 id="map-view-title">Spatial Damage Assessment Mapping Profile</h2>
    <div id="map-container"></div>
  </main>
</div>

<script>
  window.MAP_CSV_PATH = "/data/ukraine-damages.csv";
  window.MAP_GEOJSON_PATH = "/data/ukr_admn_ad1_py_s0_fieldmaps_pp_oblast.json";
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<script src="/assets/js/papaparse.min.js" defer></script>
<script src="/assets/js/map-visualisations.js" defer></script>
  </main>

  <footer class="site-footer">
  <div class="footer-container">
    <p>&copy; 2026 E-PACC Ukraine Project. Created by MapAction and ACAPS.</p>
    <p>Data sourced from ACAPS. Interactive building damage visualisations.</p>
  </div>
</footer>

</body>
</html>
