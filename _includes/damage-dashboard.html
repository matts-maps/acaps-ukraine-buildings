<link rel="stylesheet" href="{{ '/assets/css/unified-dashboard.css' | relative_url }}">

<div class="dashboard-container">

  <div id="error-msg"></div>

  <div id="controls">
    <div class="control-row">
      <div class="control-group">
        <label for="period-type">Data Aggregation:</label>
        <select id="period-type" onchange="buildPeriodDropdowns()">
          <option value="7">Weekly (7-day periods)</option>
          <option value="14" selected>Fortnightly (14-day periods)</option>
          <option value="30">Monthly</option>
        </select>
      </div>

      <div class="control-group year-checkbox-group">
        <label>Years to Compare:</label>
        <div id="year-checkboxes" class="year-checkbox-row"></div>
      </div>
    </div>

    <div class="control-row">
      <div class="control-group">
        <label for="highlight-start">Highlight Range From:</label>
        <select id="highlight-start" onchange="updateChartAndStats()"></select>
      </div>
      <div class="control-group">
        <label for="highlight-end">To:</label>
        <select id="highlight-end" onchange="updateChartAndStats()"></select>
      </div>
      <button onclick="updateChartAndStats()">Refresh Visualisations</button>
    </div>
  </div>

  <div id="chart-card">
    <div class="chart-header">
      <div>
        <h2 id="chart-title">Damaged Buildings Time Series</h2>
        <div class="subtitle" id="chart-subtitle"></div>
      </div>
      <div class="export-buttons">
        <span class="export-label">Export:</span>
        <button type="button" onclick="exportChart('png')">PNG</button>
        <button type="button" onclick="exportChart('jpg')">JPG</button>
        <button type="button" onclick="exportChart('svg')">SVG</button>
      </div>
    </div>
    <div id="chart-wrapper">
      <canvas id="myChart"></canvas>
    </div>
  </div>

  <div id="stats"></div>

</div>

<script>
  window.DASHBOARD_CSV_PATH = "{{ '/data/ukraine-damages.csv' | relative_url }}";
</script>
<script src="{{ '/assets/js/damage-dashboard.js' | relative_url }}"></script>
