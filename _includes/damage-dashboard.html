<link rel="stylesheet" href="{{ '/assets/css/damage-dashboard.css' | relative_url }}">

<div class="dashboard-container">

  <div id="error-msg"></div>

  <div id="controls">
    <div class="control-row">
      <div class="control-group">
        <label for="period-type">Data Aggregation:</label>
        <select id="period-type" onchange="buildPeriodDropdowns()">
          <option value="7">Weekly (7-day periods)</option>
          <option value="14" selected>Fortnightly (14-day periods)</option>
          <option value="30">Monthly</option>
        </select>
      </div>

      <div class="control-group">
        <label for="base-year-select">Baseline Year:</label>
        <select id="base-year-select" onchange="updateChartAndStats()"></select>
      </div>

      <div class="control-group">
        <label for="comp-year-select">Comparison Year:</label>
        <select id="comp-year-select" onchange="updateChartAndStats()"></select>
      </div>
    </div>

    <div class="control-row">
      <div class="control-group">
        <label for="highlight-start">Highlight Range From:</label>
        <select id="highlight-start" onchange="updateChartAndStats()"></select>
      </div>
      <div class="control-group">
        <label for="highlight-end">To:</label>
        <select id="highlight-end" onchange="updateChartAndStats()"></select>
      </div>
      <button onclick="updateChartAndStats()">Refresh Visualisations</button>
    </div>
  </div>

  <div id="chart-card">
    <h2 id="chart-title">Damaged Buildings Time Series</h2>
    <div class="subtitle" id="chart-subtitle"></div>
    <div id="chart-wrapper">
      <canvas id="myChart"></canvas>
    </div>
  </div>

  <div id="stats">
    <div class="stat-box" id="stat-base">
      <div class="label" id="lbl-base">Baseline Year Data</div>
      <div class="value" id="v-base">—</div>
      <div class="sub" id="sub-base"></div>
    </div>
    <div class="stat-box comparison-year" id="stat-comp">
      <div class="label" id="lbl-comp">Comparison Year Data</div>
      <div class="value" id="v-comp">—</div>
      <div class="sub" id="sub-comp"></div>
    </div>
    <div class="stat-box" id="stat-change" style="border-left-color:#555">
      <div class="label">Historical Period Delta</div>
      <div class="value change neutral" id="v-change">—</div>
      <div class="sub" id="sub-change">Comparing targeted frames matching exactly by normalized calendar index position</div>
    </div>
  </div>

</div>

<script>
  window.DASHBOARD_CSV_PATH = "{{ '/data/ukraine-damages.csv' | relative_url }}";
</script>
<script src="{{ '/assets/js/damage-dashboard.js' | relative_url }}"></script>
